blueprint:
  name: Steam Cylinder Maintenance
  description: "Tracks boiler runtime and sends alerts at thresholds (e.g. 2000h, 2400h, 2500h)."
  domain: automation
  input:
    runtime_sensor:
      name: Boiler Runtime Sensor
      description: The sensor tracking total boiler runtime in hours
      selector:
        entity:
          domain: sensor
    notify_service:
      name: Notification Service
      description: The notify service to call. Defaults to persistent_notification.
      selector:
        text: {}
      default: persistent_notification

variables:
  runtime_sensor_entity: !input runtime_sensor
  notify_svc: !input notify_service
  runtime: "{{ states(runtime_sensor_entity) | float(default=0) }}"
  message: >-
    {% if runtime >= 2500 %}
      🚨 Steam cylinder has reached END OF LIFE ({{ runtime }}h). HAPSIC efficiency is severely impacted. Replace immediately.
    {% elif runtime >= 2400 %}
      ⚠️ Steam cylinder runtime critical ({{ runtime }}h/2500h). Order replacement immediately.
    {% elif runtime >= 2000 %}
      ℹ️ Steam cylinder nearing end of life ({{ runtime }}h/2500h). Monitor scaling.
    {% else %}
      Steam cylinder runtime: {{ runtime }}h.
    {% endif %}

trigger:
  - platform: numeric_state
    entity_id: !input runtime_sensor
    above: 1999
  - platform: numeric_state
    entity_id: !input runtime_sensor
    above: 2399
  - platform: numeric_state
    entity_id: !input runtime_sensor
    above: 2499

action:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ notify_svc == 'persistent_notification' }}"
        sequence:
          - service: persistent_notification.create
            data:
              title: "HAPSIC Cylinder Maintenance"
              message: "{{ message }}"
    default:
      - service: "{{ notify_svc }}"
        data:
          title: "HAPSIC Cylinder Maintenance"
          message: "{{ message }}"
        continue_on_error: true
