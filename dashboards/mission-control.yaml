type: panel
path: humidifier2
title: Humidifier2
cards:
  - type: vertical-stack
    cards:
      - type: custom:mushroom-title-card
        title: HAPSIC Mission Control
        subtitle: >-
          Amarillo, TX • {{ states('sensor.hapsic_fsm_state') | upper }} • {{
          states('sensor.gw1200b_absolute_pressure') }} kPa
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.hapsic_fsm_state
            state: FAULT
        card:
          type: vertical-stack
          cards:
            - type: tile
              entity: sensor.hapsic_fault_reason
              name: FAULT ACTIVE
              icon: mdi:alert-octagon
              color: red
            - type: markdown
              content: |
                ### 🛑 Logic Lockout Active
                The controller has entered safety shutdown.
                **Reason:** {{ states('sensor.hapsic_fault_reason') }}
      - type: conditional
        conditions:
          - entity: sensor.hapsic_fsm_state
            state: FAULT
          - entity: sensor.hapsic_fault_reason
            state: Economizer Bypass Active
        card:
          type: tile
          entity: sensor.zehnder_comfoair_q_a4cb9c_bypass_state
          name: FREE COOLING ACTIVE (YIELDING)
          icon: mdi:snowflake-thermometer
          color: cyan
      - type: horizontal-stack
        cards:
          - type: tile
            entity: input_number.target_dew_point
            name: Target Dew Point
            icon: mdi:thermometer-water
            color: deep-purple
          - type: tile
            entity: sensor.hapsic_steam_voltage
            name: Output V
            icon: mdi:flash-auto
            color: >-
              {% if states('sensor.hapsic_steam_voltage')|float > 0 %} orange {%
              else %} grey {% endif %}
          - type: tile
            entity: input_number.humidifier_max_capacity
            name: Capacity
            icon: mdi:kettle-steam
            color: cyan
      - type: grid
        columns: 2
        square: false
        cards:
          - type: gauge
            entity: sensor.hapsic_steam_mass
            name: Injection Rate
            unit: lbs/hr
            min: 0
            max: 6
            needle: true
            severity:
              green: 0
              yellow: 4
              red: 5.5
          - type: vertical-stack
            cards:
              - type: gauge
                entity: sensor.hapsic_chi_instant
                name: Canister Health
                unit: "%"
                min: 0
                max: 120
                needle: true
                severity:
                  red: 50
                  yellow: 70
                  green: 90
              - type: markdown
                content: >
                  <center><b>Boiler State:</b> <span style="color: {% if
                  states('sensor.hapsic_boil_status') == 'BOILING' %} red {%
                  else %} grey {% endif %};">{{
                  states('sensor.hapsic_boil_status') }}</span></center>
      - type: heading
        heading: Boiler Health & Characterization
        heading_style: title
      - type: grid
        columns: 3
        square: false
        cards:
          - type: tile
            entity: sensor.hapsic_steam_mass
            name: Measured Steam
            icon: mdi:gauge
            color: >-
              {% set val = states('sensor.hapsic_steam_mass')|float(0) %}
              {% if val > 4 %} orange {% elif val > 0 %} green {% else %} grey {% endif %}
            state_content: state
          - type: tile
            entity: input_number.humidifier_max_capacity
            name: Effective Max
            icon: mdi:speedometer-medium
            color: cyan
            state_content: state
          - type: tile
            entity: sensor.hapsic_boil_status
            name: Boiler State
            icon: >-
              {% if states('sensor.hapsic_boil_status') == 'BOILING' %}
              mdi:fire {% else %} mdi:snowflake {% endif %}
            color: >-
              {% if states('sensor.hapsic_boil_status') == 'BOILING' %}
              red {% else %} grey {% endif %}
      - type: markdown
        title: Boiler Curve (Learned)
        content: >
          {% set curve = states('input_text.hapsic_boiler_curve') %}

          {% set bins = curve | from_json if curve not in ['unknown','unavailable'] else [0,0,0,0] %}

          | Voltage Band | 0–2.5V | 2.5–5V | 5–7.5V | 7.5–10V |

          | :---: | :---: | :---: | :---: | :---: |

          | **Capacity** | {{ '%.2f'|format(bins[0]) }} | {{ '%.2f'|format(bins[1]) }} | {{ '%.2f'|format(bins[2]) }} | {{ '%.2f'|format(bins[3]) }} |

          | **Bar** | {{ '█' * ((bins[0]*10)|int) }} | {{ '█' * ((bins[1]*10)|int) }} | {{ '█' * ((bins[2]*10)|int) }} | {{ '█' * ((bins[3]*10)|int) }} |
      - type: custom:apexcharts-card
        header:
          show: true
          title: Canister Health (χ Ratio)
          show_states: true
          colorize_states: true
        graph_span: 12h
        experimental:
          color_threshold: true
        series:
          - entity: sensor.hapsic_chi_instant
            name: χ Instant
            stroke_width: 1
            opacity: 0.6
            show:
              in_header: true
            color_threshold:
              - value: 0
                color: "#f44336"
              - value: 70
                color: "#ff9800"
              - value: 90
                color: "#4caf50"
          - entity: input_number.hapsic_chi_ema
            name: χ EMA (48h)
            stroke_width: 2
            color: "#9b59b6"
            curve: smooth
            show:
              in_header: true
        yaxis:
          - min: 0
            max: 120
            decimals: 0
      - type: heading
        heading: Physics Engine (Decoupled)
        heading_style: title
      - type: entities
        title: State Vector
        show_header_toggle: false
        entities:
          - entity: sensor.hapsic_room_dew_point
            name: Actual Dew Point (Goal Metric)
            icon: mdi:water-thermometer
          - entity: sensor.hapsic_room_average_temp
            name: Actual Temp
          - entity: sensor.hapsic_room_average_rh
            name: Actual RH
          - entity: sensor.hapsic_pre_steam_temp
            name: Supply Temp (T_sup)
          - entity: sensor.hapsic_pre_steam_rh
            name: Supply RH (Baseline)
          - entity: sensor.hapsic_supply_flow
            name: Airflow Mass (m3/h)
            icon: mdi:fan
      - type: heading
        heading: Duct Safety Monitor
        heading_style: title
      - type: grid
        columns: 2
        square: false
        cards:
          - type: entities
            title: Pre-Steam (Supply)
            show_header_toggle: false
            entities:
              - entity: sensor.hapsic_pre_steam_temp
                name: Temp
                icon: mdi:thermometer-chevron-down
              - entity: sensor.hapsic_pre_steam_rh
                name: Humidity
                icon: mdi:water-minus
          - type: entities
            title: Post-Steam (Duct)
            show_header_toggle: false
            entities:
              - entity: sensor.hapsic_duct_temp
                name: Temp
                icon: mdi:thermometer-chevron-up
              - entity: sensor.hapsic_duct_rh
                name: Humidity
                icon: mdi:water-plus
                card_mod:
                  style: |
                    :host {
                      --paper-item-icon-color: 
                        {% if states(config.entity)|float(0) > 85 %} red 
                        {% elif states(config.entity)|float(0) > 80 %} orange 
                        {% else %} green {% endif %};
                    }
      - type: gauge
        entity: sensor.hapsic_duct_rh
        name: Duct Saturation Safety
        unit: "%"
        min: 0
        max: 100
        needle: true
        severity:
          green: 0
          yellow: 80
          red: 90
      - type: heading
        heading: Moisture Balance Engine
        heading_style: title
      - type: custom:apexcharts-card
        header:
          show: true
          title: 1. ENGINE EFFORT
          show_states: true
          colorize_states: true
        experimental:
          color_threshold: true
        series:
          - entity: sensor.hapsic_steam_voltage
            name: Steam Output
            stroke_width: 2
            show:
              in_header: true
            color_threshold:
              - value: 0
                color: "#4caf50"
              - value: 9.5
                color: "#f44336"
        yaxis:
          - min: 0
            max: 10
            decimals: 1
        graph_span: 2h
      - type: custom:apexcharts-card
        header:
          show: true
          title: 2. WORK DONE (Lift)
          show_states: true
          colorize_states: true
        graph_span: 2h
        series:
          - entity: sensor.hapsic_target_duct_dp
            name: PID Request
            color: "#9b59b6"
            stroke_width: 2
            curve: stepline
          - entity: sensor.hapsic_duct_dp
            name: Actual Discharge
            color: "#ff9800"
            type: area
            opacity: 0.5
            stroke_width: 2
          - entity: sensor.hapsic_pre_steam_dp
            name: Baseline Intake
            color: "#2196f3"
            stroke_width: 2
        now:
          show: true
          label: Current
      - type: custom:apexcharts-card
        header:
          show: true
          title: 3. STRUCTURE VELOCITY
          show_states: true
          colorize_states: true
        graph_span: 2h
        experimental:
          color_threshold: true
        series:
          - entity: sensor.hapsic_structure_velocity
            name: Climb Rate
            type: area
            opacity: 0.3
            stroke_width: 2
            show:
              in_header: true
            color_threshold:
              - value: -10
                color: "#9e9e9e"
              - value: 0
                color: "#9c27b0"
        yaxis:
          - min: -1
            max: 1
            decimals: 2
      - type: markdown
        title: Mass Balance Tracker
        content: >
          | Metric | Value | Impact |

          | :--- | :--- | :--- |

          | **Injection** | `{{ states('sensor.hapsic_steam_mass') }} lbs/hr` |
          Wetting ⬆️ |

          | **Ventilation** | `{{ states('sensor.hapsic_ventilation_loss') }}
          lbs/hr` | Drying ⬇️ |

          | **NET FLUX** | **{{ states('sensor.hapsic_net_flux') }} lbs/hr** |
          **{{ 'CHARGING' if states('sensor.hapsic_net_flux')|float(0) > 0 else
          'DRAINING' }}** |
      - type: custom:power-flow-card-plus
        title: HAPSIC Physics Engine
        entities:
          solar:
            entity: sensor.hapsic_steam_mass
            name: Steam Input
            color: "#3498db"
            unit_of_measurement: lbs/hr
          battery:
            name: Net Flux
            entity:
              consumption: sensor.hapsic_net_flux
              production: sensor.hapsic_net_flux
            color_icon: true
            color_circle: true
            unit_of_measurement: lbs/hr
            label_consumption: Draining
            label_production: Charging
          home:
            name: Vent Loss
            entity: sensor.hapsic_ventilation_loss
            color_icon: true
            unit_of_measurement: lbs/hr
        dashboard_link: /energy
        display_zero_lines: true
        use_new_flow_rate_model: true
        min_flow_rate: 0.1
        decimals: 2
        watt_threshold: 10000
      - type: heading
        heading: Control Strategy (Loop A)
        heading_style: title
      - type: grid
        columns: 3
        square: false
        cards:
          - type: tile
            entity: sensor.hapsic_room_deficit
            name: Deficit
            icon: mdi:arrow-collapse-down
            color: >-
              {% set val = states('sensor.hapsic_room_deficit')|float(0) %}  {%
              if val < -0.5 %} blue  {% elif val < 0.5 %} green  {% elif val <
              2.0 %} orange  {% else %} red {% endif %}
            state_content: state
          - type: tile
            entity: sensor.hapsic_target_duct_dp
            name: Duct Request
            icon: mdi:target
            color: deep-purple
            state_content: state
          - type: tile
            entity: sensor.hapsic_max_achievable_dp
            name: Feasibility Limit
            icon: mdi:speedometer
            color: >-
              {% if states('sensor.hapsic_is_target_infeasible') == 'True' %}
              red {% else %} green {% endif %}
            state_content: state
      - type: custom:apexcharts-card
        header:
          show: true
          title: Target vs. Actual Dew Point
          show_states: true
          colorize_states: true
        graph_span: 6h
        series:
          - entity: sensor.hapsic_room_dew_point
            name: Actual Dew Point
            color: "#2196f3"
            stroke_width: 2
            curve: smooth
          - entity: input_number.target_dew_point
            name: Target Dew Point
            color: "#9b59b6"
            stroke_width: 2
            curve: stepline
          - entity: sensor.hapsic_max_achievable_dp
            name: Physical Limit
            color: "#f44336"
            stroke_width: 2
            type: area
            opacity: 0.1
  - title: History
    type: history-graph
    hours_to_show: 12
    entities:
      - sensor.hapsic_pre_steam_dp
      - sensor.hapsic_cleansed_airflow
      - input_number.hapsic_chi_ema
      - sensor.hapsic_duct_dp
      - sensor.hapsic_target_duct_dp
      - sensor.hapsic_max_achievable_dp
      - sensor.hapsic_chi_instant
      - sensor.hapsic_room_dew_point
      - input_number.target_dew_point
      - sensor.hapsic_steam_voltage
