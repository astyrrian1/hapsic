# =============================================================================
# HAPSIC 2.2 Gold Master — StamPLC ESPHome Configuration
# Target: M5Stack StamPLC (ESP32-S3) | ESPHome 2026.x | ESP-IDF Framework
# =============================================================================

substitutions:
  # Zehnder filter settings for CAN sensor smoothing
  filter_time: "5s"
  filter_send_every: "1"
  filter_window_size: "1"

esphome:
  name: hapsic-desk
  friendly_name: "HAPSIC Desk Simulator"
  project:
    name: "hapsic.desk"
    version: "2.3.0"
  platformio_options:
    board_build.flash_mode: dio
    lib_deps:
      - m5stack/M5Unified
      - m5stack/M5GFX
    build_flags:
      - -DARDUINO_M5STACK_STAMPLC
      - -DARDUINO_USB_CDC_ON_BOOT=1
      - -DARDUINO_USB_MSC_ON_BOOT=0
      - -DARDUINO_USB_DFU_ON_BOOT=0
      - -DDESK_MODE

esp32:
  board: m5stack-stamps3
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: arduino

# --- Network ---
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "HAPSIC-Fallback"
    password: "hapsic2024"

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80

logger:
  level: VERY_VERBOSE
  hardware_uart: USB_SERIAL_JTAG

# =============================================================================
# BUS TOPOLOGY
# =============================================================================

# Physical I2C Bus (StamPLC Port A)
i2c:
  sda: GPIO13
  scl: GPIO15
  scan: true
  id: bus_a



# Import external components
external_components:
  - source: github://yoziru/esphome-zehnder-comfoair@main
    components: [ zehnder_comfoair_q ]
  - source: github://jenscski/esphome-components@main
    components: [ aw9523 ]
  - source:
      type: local
      path: components
    components: [ hapsic ]

# CAN Bus (StamPLC PWR-CAN, SIT1044QTK/3 transceiver)
# NOTE: zehnder_comfoair_q auto-sets extended ID + 50kbps
canbus:
  - platform: esp32_can
    tx_pin: GPIO42
    rx_pin: GPIO43
    bit_rate: 50kbps
    can_id: 0
    on_frame:
      # --- Debug dump (all CAN frames) ---
      - can_id: 0
        can_id_mask: 0
        use_extended_id: true
        then:
          - lambda: |-
              auto data_pretty = remote_transmission_request ? "n/a" : format_hex_pretty(x).c_str();
              if ((can_id & 0b11111000000000011111111000000) == 0b00000000000000000000001000000)
              {
                ESP_LOGD("comfoair_dump", "Node: %ld, PDO: %ld, content: %s", can_id & 0x3f, can_id >> 14, data_pretty);
              }
      # --- PDO dispatch (populate template sensors) ---
      - can_id: 0b00000000000000000000001000000
        can_id_mask: 0b11111000000000011111111000000
        use_extended_id: true
        remote_transmission_request: false
        then:
          - lambda: |-
              auto pdo_id = id(comfoair)->get_pdo_id_from_can_id (can_id);
              switch (pdo_id)
              {
                  comfoair_on_frame_case(119, id(comfoair), exhaust_fan_flow,     false);
                  comfoair_on_frame_case(120, id(comfoair), supply_fan_flow,      false);
                  comfoair_on_frame_case(227, id(comfoair), bypass_state,         true);
                  comfoair_on_frame_case(274, id(comfoair), extract_air_temp,     false);
                  comfoair_on_frame_case(276, id(comfoair), outdoor_air_temp,     false);
                  comfoair_on_frame_case(278, id(comfoair), supply_air_temp,      false);
                  comfoair_on_frame_case(290, id(comfoair), extract_air_humidity, true);
                  comfoair_on_frame_case(292, id(comfoair), outdoor_air_humidity, true);
              }

# Zehnder ComfoAir Q component
# request_ids: polls these PDOs from the Zehnder at request_interval
# PDOs update on change, but request_ids ensures periodic refresh
zehnder_comfoair_q:
  id: comfoair
  request_interval: 60s
  request_ids:
    - 119   # exhaust fan flow (m³/h)
    - 120   # supply fan flow (m³/h)
    - 227   # bypass state (%)
    - 274   # extract air temp (°C × 10)
    - 276   # outdoor air temp (°C × 10)
    - 278   # supply air temp (°C × 10)
    - 290   # extract air humidity (%)
    - 292   # outdoor air humidity (%)

# One-Wire Bus for DS18B20 (Port A Breakout G1)
one_wire:
  - platform: gpio
    pin: GPIO1
    id: onewire_bus

# =============================================================================
# HARDWARE INITIALIZATION (Strapping Pins)
# =============================================================================
power_supply:
  - id: pin3_output_high
    pin:
      number: GPIO3
      ignore_strapping_warning: true
    enable_on_boot: true



# =============================================================================
# MQTT TELEMETRY
# =============================================================================

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password
  topic_prefix: hapsic-desk

# =============================================================================
# OUTPUTS (Actuators)
# =============================================================================

output:
  # Steam Valve DAC
  - platform: template
    id: steam_dac
    type: float
    write_action:
      - logger.log:
          format: "Desk Steam Output: %.2f V"
          args: ['state * 10.0']
      - sensor.template.publish:
          id: sim_steam_volts
          state: !lambda 'return state * 10.0;'

  # Fan Override DAC
  - platform: template
    id: fan_dac
    type: float
    write_action:
      - logger.log:
          format: "Desk Fan Output: %.2f V"
          args: ['state * 10.0']
      - sensor.template.publish:
          id: sim_fan_volts
          state: !lambda 'return state * 10.0;'

# =============================================================================
# BINARY SENSOR — Required by zehnder_comfoair_q component header
# (its template SFINAE checks for binary_sensor::BinarySensor)
# =============================================================================

binary_sensor:
  - platform: template
    id: comfoair_heating_season
    name: "Heating Season"
    internal: true

  - platform: template
    id: comfoair_cooling_season
    name: "Cooling Season"
    internal: true

# =============================================================================
# BUTTON — Manual Reset (auto-appears in HA as a button entity)
# =============================================================================

button:
  - platform: template
    name: "HAPSIC Manual Reset"
    id: hapsic_manual_reset
    icon: mdi:restart-alert
    on_press:
      then:
        - logger.log: "Manual Reset pressed"

  - platform: restart
    name: "HAPSIC Reboot"

  - platform: safe_mode
    name: "HAPSIC Safe Mode Restart"
    id: hapsic_safe_mode
    
# =============================================================================
# NUMBER — Max Steam Capacity (Moved to Home Assistant Sensor Cache)
# =============================================================================

# =============================================================================
# SENSORS
# =============================================================================

sensor:
  - platform: template
    name: "Desk Simulated Steam Voltage"
    id: sim_steam_volts
    unit_of_measurement: "V"
    accuracy_decimals: 2
    
  - platform: template
    name: "Desk Simulated Fan Voltage"
    id: sim_fan_volts
    unit_of_measurement: "V"
    accuracy_decimals: 2

  # ===========================================================================
  # LOCAL HARDWARE SENSORS
  # ===========================================================================

  # --- Desk Mode: Shelly HA Shadows for Duct Sensors ---
  - platform: homeassistant
    name: "HAPSIC Duct Temp (Desk Mode)"
    entity_id: sensor.shelly0110dimg3_28372f3e866c_temperature_2
    id: duct_temp_ds18b20
    filters:
      - lambda: return (x - 32.0) * (5.0 / 9.0);

  - platform: homeassistant
    name: "HAPSIC Duct Humidity (Desk Mode)"
    entity_id: sensor.shelly0110dimg3_28372f3e866c_input_100_analog
    id: duct_rh_scaled

  # --- Desk Mode: HA Shadows for zehnder_comfoair_q CAN Sensors ---
  - platform: homeassistant
    name: "HA Shadow Supply Flow"
    entity_id: sensor.zehnder_comfoair_q_a4cb9c_supply_fan_flow
    id: ha_shadow_supply_flow
    on_value:
      - sensor.template.publish:
          id: supply_fan_flow
          state: !lambda 'return x;'

  - platform: homeassistant
    name: "HA Shadow Exhaust Flow"
    entity_id: sensor.zehnder_comfoair_q_a4cb9c_extract_fan_flow
    id: ha_shadow_extract_flow
    on_value:
      - sensor.template.publish:
          id: exhaust_fan_flow
          state: !lambda 'return x;'

  - platform: homeassistant
    name: "HA Shadow Supply Humidity"
    entity_id: sensor.zehnder_comfoair_q_a4cb9c_supply_air_humidity
    id: ha_shadow_supply_rh

  - platform: homeassistant
    name: "HA Shadow Extract Air Temp"
    entity_id: sensor.zehnder_comfoair_q_a4cb9c_extract_air_temperature
    id: ha_shadow_extract_temp
    filters:
      - lambda: return ((x - 32.0) * 5.0 / 9.0) * 10.0;
    on_value:
      - sensor.template.publish:
          id: extract_air_temp
          state: !lambda 'return x;'

  - platform: homeassistant
    name: "HA Shadow Extract Air Humidity"
    entity_id: sensor.zehnder_comfoair_q_a4cb9c_extract_air_humidity
    id: ha_shadow_extract_rh
    on_value:
      - sensor.template.publish:
          id: extract_air_humidity
          state: !lambda 'return x;'

  - platform: homeassistant
    name: "HA Shadow Supply Air Temp"
    entity_id: sensor.zehnder_comfoair_q_a4cb9c_supply_air_temperature
    id: ha_shadow_supply_temp
    filters:
      - lambda: return ((x - 32.0) * 5.0 / 9.0) * 10.0;
    on_value:
      - sensor.template.publish:
          id: supply_air_temp
          state: !lambda 'return x;'

  - platform: homeassistant
    name: "HA Shadow Outdoor Air Temp"
    entity_id: sensor.zehnder_comfoair_q_a4cb9c_outside_air_temperature
    id: ha_shadow_outdoor_temp
    filters:
      - lambda: return ((x - 32.0) * 5.0 / 9.0) * 10.0;
    on_value:
      - sensor.template.publish:
          id: outdoor_air_temp
          state: !lambda 'return x;'

  - platform: homeassistant
    name: "HA Shadow Outdoor Air Humidity"
    entity_id: sensor.zehnder_comfoair_q_a4cb9c_outside_air_humidity
    id: ha_shadow_outdoor_rh
    on_value:
      - sensor.template.publish:
          id: outdoor_air_humidity
          state: !lambda 'return x;'

  - platform: homeassistant
    name: "HA Shadow Bypass State"
    entity_id: sensor.zehnder_comfoair_q_a4cb9c_bypass_state
    id: ha_shadow_bypass_state
    on_value:
      - sensor.template.publish:
          id: bypass_state
          state: !lambda 'return x;'

  # ===========================================================================
  # ZEHNDER CAN TEMPLATE SENSORS (populated via on_frame PDO callbacks)
  # ===========================================================================

  - platform: template
    id: supply_fan_flow    # PDO 120
    name: "Zehnder Supply Flow"
    internal: true
    icon: mdi:gauge
    accuracy_decimals: 0
    unit_of_measurement: "m³/h"
    state_class: measurement

  - platform: template
    id: exhaust_fan_flow   # PDO 119
    name: "Zehnder Exhaust Flow"
    internal: true
    icon: mdi:gauge
    accuracy_decimals: 0
    unit_of_measurement: "m³/h"
    state_class: measurement

  - platform: template
    id: bypass_state       # PDO 227
    name: "Zehnder Bypass State"
    internal: true
    accuracy_decimals: 0
    unit_of_measurement: "%"
    state_class: measurement

  - platform: template
    id: extract_air_temp   # PDO 274
    name: "Zehnder Extract Air Temp"
    internal: true
    filters: [multiply: 0.1]
    accuracy_decimals: 1
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement

  - platform: template
    id: outdoor_air_temp   # PDO 276
    name: "Zehnder Outdoor Air Temp"
    internal: true
    filters: [multiply: 0.1]
    accuracy_decimals: 1
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement

  - platform: template
    id: supply_air_temp    # PDO 278
    name: "Zehnder Supply Air Temp"
    internal: true
    filters: [multiply: 0.1]
    accuracy_decimals: 1
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement

  - platform: template
    id: extract_air_humidity  # PDO 290
    name: "Zehnder Extract Air Humidity"
    internal: true
    accuracy_decimals: 0
    unit_of_measurement: "%"
    device_class: humidity
    state_class: measurement

  - platform: template
    id: outdoor_air_humidity  # PDO 292
    name: "Zehnder Outdoor Air Humidity"
    internal: true
    accuracy_decimals: 0
    unit_of_measurement: "%"
    device_class: humidity
    state_class: measurement

  # ===========================================================================
  # HOME ASSISTANT PUSHED VALUES (via Native API — 3 values only)
  # PLC caches last values and uses Zehnder extract as fallback
  # ===========================================================================

  - platform: homeassistant
    name: "Target Dew Point"
    entity_id: input_number.target_dew_point
    id: target_dew_point_ha
    internal: false
    filters:
      - lambda: return (x - 32.0) * (5.0 / 9.0);

  - platform: homeassistant
    name: "Max Capacity"
    entity_id: input_number.humidifier_max_capacity
    id: max_capacity_ha
    internal: false
    filters:
      - lambda: return x * 0.453592;

  - platform: homeassistant
    name: "House Avg Temperature"
    entity_id: sensor.house_average_temperature
    id: room_avg_temp_ha
    filters:
      - lambda: return (x - 32.0) * (5.0 / 9.0);

  - platform: homeassistant
    name: "House Avg Humidity"
    entity_id: sensor.house_average_humidity
    id: room_avg_rh_ha

  - platform: homeassistant
    name: "HA Shadow Extract Air Temp"
    entity_id: sensor.zehnder_comfoair_q_a4cb9c_extract_air_temperature
    id: extract_air_temp_ha
    filters:
      - lambda: return (x - 32.0) * (5.0 / 9.0);

  - platform: homeassistant
    name: "HA Shadow Extract Air Humidity"
    entity_id: sensor.zehnder_comfoair_q_a4cb9c_extract_air_humidity
    id: extract_air_humidity_ha

  - platform: homeassistant
    name: "HA Shadow Supply Air Humdity"
    entity_id: sensor.zehnder_comfoair_q_a4cb9c_supply_air_humidity
    id: supply_air_humidity_ha

  - platform: homeassistant
    name: "HA Shadow Supply Flow"
    entity_id: sensor.zehnder_comfoair_q_a4cb9c_supply_fan_flow
    id: supply_fan_flow_ha

# =============================================================================
# TEXT SENSORS — FSM State Published to HA
# =============================================================================

text_sensor:
  - platform: template
    name: "HAPSIC FSM State"
    id: fsm_state_text
    update_interval: 5s

  - platform: template
    name: "HAPSIC Fault Reason"
    id: fault_reason_text
    update_interval: 5s

# =============================================================================
# HAPSIC CONTROLLER — External Component (C++ Physics Engine)
# =============================================================================

hapsic:
  duct_temp_sensor: duct_temp_ds18b20
  duct_rh_sensor: duct_rh_scaled
  supply_flow_sensor: ha_shadow_supply_flow
  extract_flow_sensor: ha_shadow_extract_flow
  bypass_sensor: bypass_state
  outdoor_temp_sensor: outdoor_air_temp
  outdoor_rh_sensor: outdoor_air_humidity
  house_temp_sensor: room_avg_temp_ha
  house_rh_sensor: room_avg_rh_ha
  extract_can_temp_sensor: extract_air_temp
  extract_can_rh_sensor: extract_air_humidity
  extract_ha_temp_sensor: extract_air_temp_ha
  extract_ha_rh_sensor: extract_air_humidity_ha
  supply_can_temp_sensor: supply_air_temp
  supply_can_rh_sensor: ha_shadow_supply_rh
  supply_ha_temp_sensor: room_avg_temp_ha
  supply_ha_rh_sensor: supply_air_humidity_ha
  target_dew_point_sensor: target_dew_point_ha
  max_capacity_sensor: max_capacity_ha
  manual_reset_button: hapsic_manual_reset
  steam_dac: steam_dac
  fan_dac: fan_dac
  fsm_text_sensor: fsm_state_text
  fault_text_sensor: fault_reason_text
# 
  # WARNING: DO NOT RENAME THESE ENTITIES OR CHANGE THEIR IDS.
  # Changing entity names will break historical data continuity and dashboards in Home Assistant.
  tel_feasibility_max_achievable_dp:
    name: "HAPSIC Max Achievable DP (Desk Mode)"
  tel_feasibility_total_loss_cfm:
    name: "HAPSIC Total Loss CFM (Desk Mode)"
  tel_loop_a_pv_room_dp:
    name: "HAPSIC Loop A PV Room DP (Desk Mode)"
  tel_loop_a_error:
    name: "HAPSIC Loop A Error (Desk Mode)"
  tel_loop_a_p_term:
    name: "HAPSIC Loop A P Term (Desk Mode)"
  tel_loop_a_i_term:
    name: "HAPSIC Loop A I Term (Desk Mode)"
  tel_loop_a_integrator:
    name: "HAPSIC Loop A Integrator (Desk Mode)"
  tel_loop_a_output_target:
    name: "HAPSIC Loop A Output Target (Desk Mode)"
  tel_loop_b_pv_duct_dp:
    name: "HAPSIC Loop B PV Duct DP (Desk Mode)"
  tel_loop_b_error:
    name: "HAPSIC Loop B Error (Desk Mode)"
  tel_loop_b_v_ff:
    name: "HAPSIC Loop B Feedforward (Desk Mode)"
  tel_loop_b_p_term:
    name: "HAPSIC Loop B P Term (Desk Mode)"
  tel_loop_b_i_term:
    name: "HAPSIC Loop B I Term (Desk Mode)"
  tel_loop_b_integrator:
    name: "HAPSIC Loop B Integrator (Desk Mode)"
  tel_loop_b_ideal_voltage:
