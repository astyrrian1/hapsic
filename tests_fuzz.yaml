esphome:
  name: hapsic-fuzz
  friendly_name: "HAPSIC Fuzz Test"

  on_boot:
    priority: 800
    then:
      - logger.log: "FUZZ TEST STARTED"
      - delay: 2s

globals:
  - id: g_steam_out
    type: float
    initial_value: '0.0'
  - id: g_fan_out
    type: float
    initial_value: '0.0'
  - id: g_fuzz_counter
    type: int
    initial_value: '0'

host:

logger:
  level: INFO

# 1. Inputs (Sensors)
sensor:
  - platform: template
    name: "Simulated Duct Temp"
    id: sim_duct_temp
    unit_of_measurement: "°C"

  - platform: template
    name: "Simulated Duct RH"
    id: sim_duct_rh
    unit_of_measurement: "%"
  
  - platform: template
    name: "Simulated Supply Flow"
    id: sim_supply_flow
    unit_of_measurement: "m³/h"

  - platform: template
    name: "Simulated Extract Flow"
    id: sim_extract_flow
    unit_of_measurement: "m³/h"

  - platform: template
    name: "Simulated Bypass"
    id: sim_bypass
    unit_of_measurement: "%"

  - platform: template
    name: "Simulated Outdoor Temp"
    id: sim_outdoor_temp
    unit_of_measurement: "°C"

  - platform: template
    name: "Simulated Outdoor RH"
    id: sim_outdoor_rh
    unit_of_measurement: "%"

  - platform: template
    name: "Simulated Pre-Steam/Extract Temp"
    id: sim_extract_temp
    unit_of_measurement: "°C"

  - platform: template
    name: "Simulated Pre-Steam/Extract RH"
    id: sim_extract_rh
    unit_of_measurement: "%"

  # HA Imported Values
  - platform: template
    name: "Simulated Target Dew Point"
    id: sim_target_dew_point

  - platform: template
    name: "Simulated House Avg Temp"
    id: sim_avg_temp

  - platform: template
    name: "Simulated House Avg RH"
    id: sim_avg_rh

# 2. Controls
number:
  - platform: template
    name: "Max Capacity"
    id: sim_max_capacity
    initial_value: 5.0
    min_value: 0.0
    max_value: 15.0
    step: 0.5
    optimistic: true

button:
  - platform: template
    name: "Manual Reset"
    id: sim_manual_reset

# 3. Outputs
output:
  - platform: template
    id: sim_steam_dac
    type: float
    write_action:
      - lambda: id(g_steam_out) = state;

  - platform: template
    id: sim_fan_dac
    type: float
    write_action:
      - lambda: id(g_fan_out) = state;

switch:
  - platform: template
    name: "Safety Relay"
    id: sim_safety_relay
    optimistic: true

# 4. Feedback
text_sensor:
  - platform: template
    name: "FSM State"
    id: sim_fsm_state

  - platform: template
    name: "Fault Reason"
    id: sim_fault_reason

# 5. Component Under Test
external_components:
  - source:
      type: local
      path: components
    components: [ hapsic ]

hapsic:
  duct_temp_sensor: sim_duct_temp
  duct_rh_sensor: sim_duct_rh
  supply_flow_sensor: sim_supply_flow
  extract_flow_sensor: sim_extract_flow
  bypass_sensor: sim_bypass
  outdoor_temp_sensor: sim_outdoor_temp
  outdoor_rh_sensor: sim_outdoor_rh
  pre_steam_temp_sensor: sim_extract_temp
  pre_steam_rh_sensor: sim_extract_rh
  extract_avg_temp_sensor: sim_avg_temp
  extract_avg_rh_sensor: sim_avg_rh
  target_dew_point_sensor: sim_target_dew_point
  max_capacity_number: sim_max_capacity
  manual_reset_button: sim_manual_reset
  steam_dac: sim_steam_dac
  fan_dac: sim_fan_dac
  safety_relay: sim_safety_relay
  fsm_text_sensor: sim_fsm_state
  fault_text_sensor: sim_fault_reason
  update_interval: 100ms # Run fast!

# 6. Fuzz Logic
interval:
  - interval: 100ms
    then:
      - lambda: |-
          id(g_fuzz_counter)++;
          
          auto r_float = [](float min, float max) {
             return min + static_cast <float> (rand()) /( static_cast <float> (RAND_MAX/(max-min)));
          };
          auto maybe_nan = [&](float val) {
             return (rand() % 100 == 0) ? NAN : val;
          };

          // Inject random values
          id(sim_duct_temp).publish_state(maybe_nan(r_float(-10.0, 50.0)));
          // Cap duct RH at 100 to avoid physics violations? Nah, let's fuzz it.
          id(sim_duct_rh).publish_state(maybe_nan(r_float(0.0, 110.0))); 
          
          if (rand() % 50 == 0) {
             id(sim_supply_flow).publish_state(0.0); // Zero Flow Fault
          } else {
             id(sim_supply_flow).publish_state(r_float(50.0, 500.0));
          }
          
          id(sim_extract_flow).publish_state(r_float(50.0, 500.0));
          id(sim_bypass).publish_state(r_float(0.0, 100.0));
          
          id(sim_outdoor_temp).publish_state(maybe_nan(r_float(-20.0, 40.0)));
          id(sim_outdoor_rh).publish_state(maybe_nan(r_float(0.0, 100.0)));
          
          id(sim_extract_temp).publish_state(maybe_nan(r_float(15.0, 30.0)));
          id(sim_extract_rh).publish_state(maybe_nan(r_float(10.0, 90.0)));
          
          id(sim_target_dew_point).publish_state(r_float(30.0, 60.0));
          id(sim_avg_temp).publish_state(r_float(18.0, 25.0));
          id(sim_avg_rh).publish_state(r_float(10.0, 80.0));

          if (id(g_fuzz_counter) % 10 == 0) {
             // Invariant Check: Steam must be 0 if supply flow is low
             // Note: It takes 1 tick to react, so we check previous state? or just general safety.
             // Here we just log to minimize noise
             ESP_LOGD("fuzz", "Fuzz tick %d", id(g_fuzz_counter));
          }
