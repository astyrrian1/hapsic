name: HAPSIC CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install ruff paho-mqtt pyyaml

      - name: Lint (ruff)
        run: ruff check hapsic.py scenario_builder.py scenario_tester.py run_compare.py --select E,W --ignore E402,E501,E701,W291,W292,W293

      - name: Unit Tests - Psychrometrics
        run: python3 test_psychrometrics.py

      - name: Unit Tests - Unit Conversions
        run: python3 test_unit_conversions.py

      - name: Unit Tests - Sensor Fallback
        run: python3 test_sensor_fallback.py

      - name: Unit Tests - Output Safety
        run: python3 test_output_safety.py

      - name: Integration Tests - FSM Transitions
        run: python3 test_fsm_transitions.py

      - name: Generate Scenario Data
        run: python3 scenario_builder.py

      - name: Integration Tests - Python Scenarios
        run: python3 scenario_tester.py

      - name: Integration Tests - PID Compare
        run: python3 run_compare.py

  esphome-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ESPHome
        run: pip install esphome

      - name: Create secrets.yaml stub
        run: |
          cat > secrets.yaml <<'EOF'
          wifi_ssid: "test"
          wifi_password: "test"
          mqtt_broker: "127.0.0.1"
          mqtt_username: "test"
          mqtt_password: "test"
          ap_password: "test"
          api_encryption_key: "dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleTE="
          ota_password: "test"
          ha_token: "test"
          EOF

      - name: Validate Production Config
        run: esphome config stamplc.yaml > /dev/null
        continue-on-error: true

      - name: Validate Desk Config
        run: esphome config stamplc_desk.yaml > /dev/null
        continue-on-error: true

