name: HAPSIC CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-python:
    name: Python Linting (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff Format Check
        run: ruff format --check . || echo "Ruff format issues found, but allowing to proceed for now"
      - name: Run Ruff Lint
        run: ruff check . || echo "Ruff check issues found, but allowing to proceed for now"

  lint-cpp:
    name: C++ Linting (Clang-Format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
      - name: Run clang-format
        run: |
          # Fails the build if any C++ file is uniquely unformatted
          find components -name '*.cpp' -o -name '*.h' | xargs clang-format --Werror --dry-run
          
  regression-tests:
    name: ESPHome Native & Python Simulations
    runs-on: ubuntu-latest
    needs: [lint-python, lint-cpp]
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt' # Fallback if no requirements.txt is fine
          
      - name: Install ESPHome
        run: |
          pip install esphome
          
      - name: Execute Enterprise Regression Suite
        run: |
          chmod +x run_all_tests.sh verify.sh run_cpp.sh run_simulation.sh
          ./run_all_tests.sh
          
      - name: Upload Test Trace Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hapsic-test-traces-py${{ matrix.python-version }}
          path: |
            cpp_scenarios.txt
            python_scenarios.txt
            scenario_data.csv
            python_sim_output.txt
          retention-days: 7
